<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>패스파인더 | 프리미엄 입시 컨설팅</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --primary: #003876; /* 연세 블루 */
            --secondary: #002147;
            --accent: #0070c0;
            --bg-light: #f4f7fa;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--white); color: #333; line-height: 1.7; }

        /* 공통 섹션 스타일 */
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        .section-title { text-align: center; margin-bottom: 50px; }
        .section-title h2 { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .section-title p { color: #666; font-size: 1.1rem; }

        /* 헤더 */
        header { background: var(--white); padding: 20px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--primary); letter-spacing: -1px; }

        /* 메인 비주얼 */
        .hero { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--white); text-align: center; padding: 100px 20px; }
        .hero h1 { font-size: 2.8rem; line-height: 1.2; margin-bottom: 20px; }
        .hero mark { background: none; color: #57d9ff; font-weight: bold; }

        /* 3대 핵심 시스템 (PDF/PPT 내용) */
        .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .feature-card { background: var(--bg-light); padding: 30px; border-radius: 20px; text-align: center; }
        .feature-card h3 { color: var(--primary); margin-bottom: 15px; }

        /* 리포트 분석 예시 (이진원 학생 리포트 내용) */
        .report-sample { background: #fff; border: 2px solid var(--primary); border-radius: 20px; padding: 40px; margin-top: 30px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .report-item { background: #f9f9f9; padding: 20px; border-radius: 10px; }
        .ba-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .before { background: #ffe3e3; color: #d63031; }
        .after { background: #e3fcef; color: #00b894; }

        /* 하단 고정 버튼 */
        .cta-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 1000; }
        .btn { flex: 1; text-align: center; padding: 18px; border-radius: 12px; font-weight: bold; text-decoration: none; font-size: 1.1rem; transition: 0.3s; }
        .btn-call { background: #eee; color: #333; margin-right: 10px; }
        .btn-apply { background: var(--primary); color: #fff; }
        
        @media (max-width: 768px) {
            .features, .report-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">PATHFINDER 입시연구소</div>
</header>

<section class="hero">
    <h1>기록을 넘어 <mark>합격</mark>으로,<br>패스파인더가 증명합니다.</h1>
    <p>부천 지역 학교 특성을 완벽 분석한 밀착 생기부 관리</p>
</section>

<div class="container">
    <div class="section-title">
        <h2>차별화된 3대 관리 시스템</h2>
        <p>안내서(PDF)에 담긴 패스파인더만의 약속입니다.</p>
    </div>
    
    <div class="features">
        <div class="feature-card">
            <h3>Not
